{% extends 'base.html' %}

{% block title %}Forgot Password – AlumniConnect{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-16 px-4">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700 p-8 sm:p-10">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-amber-50 dark:bg-amber-900/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-key text-2xl text-accent"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Forgot Password?</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">Enter your email to receive a reset link</p>
      </div>

      <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="mb-6">
          <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
          <input type="email" id="email" name="email" required
            placeholder="your.email@example.com"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600
                   bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                   placeholder-gray-400 dark:placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                   transition-all text-sm">
        </div>

        <button type="submit"
                class="w-full py-3 px-6 bg-primary hover:bg-indigo-700 text-white font-bold rounded-xl
                       shadow-md transition-all duration-200 hover:-translate-y-0.5 text-sm
                       focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-gray-800">
          Send Reset Link <i class="fas fa-paper-plane ml-1.5"></i>
        </button>
      </form>

      <div class="mt-8 text-center space-y-3 text-sm">
        <p class="text-gray-600 dark:text-gray-400">
          Remembered your password?
          <a href="{{ url_for('auth.login') }}" class="text-primary font-semibold hover:underline ml-1">Sign In</a>
        </p>
        <a href="{{ url_for('main.index') }}" class="inline-flex items-center gap-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
          <i class="fas fa-arrow-left text-xs"></i> Back to Home
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
