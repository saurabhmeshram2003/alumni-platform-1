{% extends 'base.html' %}

{% block title %}Forgot Password - Alumni Platform{% endblock %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper"><div class="auth-container">
    <div class="auth-header">
        <h1>Forgot Password</h1>
        <p>Enter your email to receive a reset link</p>
    </div>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="your.email@example.com" required>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Send Reset Link</button>
    </form>

    <div class="auth-footer">
        Remembered your password? <a href="{{ url_for('auth.login') }}">Sign In</a>
        <br><br>
        <a href="{{ url_for('main.index') }}" style="color: var(--text-muted);">&larr; Back to Home</a>
    </div>
</div>
</div>
{% endblock %}
