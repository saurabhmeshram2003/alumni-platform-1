{% extends 'base.html' %}

{% block title %}Login – AlumniConnect{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-16 px-4">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700 p-8 sm:p-10">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-graduation-cap text-2xl text-primary"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Welcome Back</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">Sign in to your AlumniConnect account</p>
      </div>

      <!-- Form -->
      <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <!-- Email -->
        <div class="mb-5">
          <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
          <input
            type="email" id="email" name="email" required
            placeholder="your.email@example.com"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600
                   bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                   placeholder-gray-400 dark:placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                   transition-all text-sm"
          >
          <div id="emailError" class="mt-1.5 text-xs text-red-600 dark:text-red-400 hidden"></div>
        </div>

        <!-- Password -->
        <div class="mb-5">
          <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Password</label>
          <div class="relative">
            <input
              type="password" id="password" name="password" required
              placeholder="Enter your password"
              class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-300 dark:border-gray-600
                     bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                     placeholder-gray-400 dark:placeholder-gray-500
                     focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                     transition-all text-sm"
            >
            <button type="button" onclick="togglePassword('password')"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 focus:outline-none p-1">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <!-- Forgot Password -->
        <div class="flex justify-end mb-6">
          <a href="{{ url_for('auth.forgot_password') }}" class="text-sm text-primary hover:text-indigo-700 dark:hover:text-indigo-400 font-medium transition-colors">
            Forgot Password?
          </a>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full py-3 px-6 bg-primary hover:bg-indigo-700 text-white font-bold rounded-xl
                       shadow-md shadow-indigo-200 dark:shadow-none
                       transition-all duration-200 hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-gray-800 text-sm">
          Sign In <i class="fas fa-sign-in-alt ml-1.5"></i>
        </button>
      </form>

      <!-- Footer -->
      <div class="mt-8 text-center space-y-3 text-sm">
        <p class="text-gray-600 dark:text-gray-400">
          Don't have an account?
          <a href="{{ url_for('auth.register') }}" class="text-primary font-semibold hover:underline ml-1">Create Account</a>
        </p>
        <a href="{{ url_for('main.index') }}" class="inline-flex items-center gap-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
          <i class="fas fa-arrow-left text-xs"></i> Back to Home
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    const email = document.getElementById('email').value;
    const emailError = document.getElementById('emailError');
    if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
      e.preventDefault();
      emailError.textContent = 'Please enter a valid email address.';
      emailError.classList.remove('hidden');
    } else {
      emailError.classList.add('hidden');
    }
  });
</script>
{% endblock %}
