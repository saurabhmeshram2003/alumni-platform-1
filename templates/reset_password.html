{% extends 'base.html' %}

{% block title %}Reset Password – AlumniConnect{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-16 px-4">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700 p-8 sm:p-10">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-lock-open text-2xl text-secondary"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Reset Password</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">Enter your new password below</p>
      </div>

      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" id="resetForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <!-- New Password -->
        <div class="mb-5">
          <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">New Password</label>
          <div class="relative">
            <input type="password" id="password" name="password" required
              placeholder="Create new password"
              class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-300 dark:border-gray-600
                     bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                     placeholder-gray-400 dark:placeholder-gray-500
                     focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                     transition-all text-sm">
            <button type="button" onclick="togglePassword('password')"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 focus:outline-none p-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <p id="passwordError" class="mt-1.5 text-xs text-gray-500 dark:text-gray-400">Min 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char.</p>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label for="confirm_password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Confirm New Password</label>
          <div class="relative">
            <input type="password" id="confirm_password" name="confirm_password" required
              placeholder="Confirm new password"
              class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-300 dark:border-gray-600
                     bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                     placeholder-gray-400 dark:placeholder-gray-500
                     focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                     transition-all text-sm">
            <button type="button" onclick="togglePassword('confirm_password')"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 focus:outline-none p-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <p id="confirmError" class="mt-1.5 text-xs text-red-600 dark:text-red-400 hidden">Passwords do not match.</p>
        </div>

        <button type="submit"
                class="w-full py-3 px-6 bg-primary hover:bg-indigo-700 text-white font-bold rounded-xl
                       shadow-md transition-all duration-200 hover:-translate-y-0.5 text-sm
                       focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-gray-800">
          Reset Password <i class="fas fa-shield-alt ml-1.5"></i>
        </button>
      </form>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  const form = document.getElementById('resetForm');
  const passwordInput = document.getElementById('confirm_password');
  const confirmInput = document.getElementById('confirm_password');
  const confirmError = document.getElementById('confirmError');
  let isValidPass = false;

  function validatePassword() {
    const val = document.getElementById('password').value;
    let score = 0;
    if (val.length >= 8) score++;
    if (/[a-z]/.test(val) && /[A-Z]/.test(val)) score++;
    if (/\d/.test(val)) score++;
    if (/[\W_]/.test(val)) score++;
    isValidPass = score === 4;
    validateConfirm();
  }

  function validateConfirm() {
    const pw = document.getElementById('password').value;
    const cpw = document.getElementById('confirm_password').value;
    if (cpw.length > 0 && cpw !== pw) {
      confirmError.classList.remove('hidden');
    } else {
      confirmError.classList.add('hidden');
    }
  }

  document.getElementById('password').addEventListener('keyup', validatePassword);
  document.getElementById('confirm_password').addEventListener('keyup', validateConfirm);

  form.addEventListener('submit', function(e) {
    const pw = document.getElementById('password').value;
    const cpw = document.getElementById('confirm_password').value;
    validatePassword();
    validateConfirm();
    if (!isValidPass || pw !== cpw) {
      e.preventDefault();
    }
  });
</script>
{% endblock %}
